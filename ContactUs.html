<!DOCTYPE html>

    <head>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body>
        <header class="panel">
            <a href="HomePage.html" class="brand">
                <img src="./images/logo.png" alt="logo" class="logo">
                <h1>Santa Ana Landscaping</h1>
            </a>

            <div class="container">
                <a href="HomePage.html" class="B">Home</a>
                <a href="Services.html" class="B">Our Services</a>
                <a href="ContactUs.html" class="B">Contact Us</a>
                <a href="Reviews.html" class="B">Reviews</a>
                <a href="AboutUs.html" class="B">About Us</a>
            </div>
        </header>

        <div class="midSection">

            <h2>Contact Us!</h2>
            <h3>For a free quote or any questions, reach us at</h3>
            <ul>
                <li>262-862-2001</li>
                <li>SALandscaping01@gmail.com</li>
            </ul>
            <h3>Or fill out this form:</h3>
            <!-- <form class="form"> -->
                <fieldset class="fieldset">
                    <legend>And we'll get right back to you</legend> <!--Contact Us-->
                    <div class="field">
                        <label>Name</label>
                        <input type="text"  name="name"     placeholder="First and Last"    autocomplete="name">
                    </div>
                    <div class="field">
                        <label>Cell Number</label>
                        <input type="tel"   name="phone"    placeholder="Number"            autocomplete="tel"              pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
                    </div>
                    <div class="field">
                        <label>Email Address</label>
                        <input type="email" name="email"    placeholder="Email Address"     autocomplete="email">
                    </div>
                    <div class="field">
                        <label>Street Address</label>
                        <input type="text"  name="address"  placeholder="Street Address"    autocomplete="street-address">
                    </div>
                    <div class="field">
                        <label>City</label>
                        <input type="text"  name="city"     placeholder="City"              autocomplete="address-level2">
                    </div>
                    <div class="field">
                        <label>Zip Code</label>
                        <input type="text"  name="zip"      placeholder="Zip Code"          autocomplete="postal-code">
                    </div>
                    <!-- <input type="text" name="state" autocomplete="address-level1" placeholder="State">
                    <input type="text" name="country"           autocomplete="country"          placeholder="Country"> -->
                </fieldset>
            <!-- </form> -->

        </div>

        <footer>
            <p>Copyright © Ernesto Cosio - All Rights Reserved</p>

            <!-- Social Media Icons -->
            <div class="socials">
                <a class="facebook" 
                    href="https://www.facebook.com/santaanalandscaping"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a class="instagram" 
                    href="https://www.instagram.com/ecosio3/" 
                    target="_blank" 
                    rel="noopener norefferrer"
                    aria-label="LinkedIn">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a class="linkedin" 
                    href="https://www.linkedin.com/in/ernestocosio/" 
                    target="_blank" 
                    rel="noopener norefferrer"
                    aria-label="LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
            </div>
        </footer>
    </body>
