<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, intial-scale=1.0">
        <title>Santa Ana Landscaping</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" href="./images/Favicon.ico">
        <!-- <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet"> -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </head>

    <body>
        <header class="panel">
            <a href="HomePage.html" class="brand">
                <img src="./images/logo.png" alt="logo" class="logo">
                <h1>Santa Ana Landscaping</h1>
            </a>

            <div class="container">
                <a href="HomePage.html" class="B">Home</a>
                <a href="Services.html" class="B">Our Services</a>
                <a href="ContactUs.html" class="B">Contact Us</a>
                <a href="Reviews.html" class="B">Reviews</a>
                <a href="AboutUs.html" class="B">About Us</a>
            </div>
        </header>

        <div class="midSection">

            <h2>Get A Free Quote!</h2>
            <h3>Reach Us At:</p>
            <p>262-862-2001</p>
            <p>SALandscaping01@gmail.com</p>
            <h3>Or Fill Out the Form Below:</h3>
            <form class="form">
                <fieldset class="fieldset">
                    <legend>Contact Form</legend>
                    <input type="text"  name="name"             placeholder="Name"              autocomplete="name">
                    <input type="tel"   name="phone"            placeholder="Number"            autocomplete="tel" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
                    <input type="email" name="email"            placeholder="Email Address"     autocomplete="email">
                    <input type="text"  name="address"           placeholder="Street Address"    autocomplete="street-address">
                    <input type="text"  name="city"             placeholder="City"              autocomplete="address-level2">
                    <input type="text"  name="zip"           placeholder="Zip Code"          autocomplete="postal-code">

                    <!-- <input type="text" name="state" autocomplete="address-level1" placeholder="State">
                    <input type="text" name="country"           autocomplete="country"          placeholder="Country"> -->
                </fieldset>
            </form>

        </div>

        <footer>
            <p>Copyright © Ernesto Cosio - All Rights Reserved</p>

            <!-- Social Media Icons -->
            <div class="socials">
                <a class="facebook" 
                    href="https://www.facebook.com/santaanalandscaping"
                    target="_blank"
                    rel="noopener noreferrer"
                    aria-label="Facebook">
                    <i class="fa-brands fa-facebook-f"></i>
                </a>
                <a class="instagram" 
                    href="https://www.instagram.com/ecosio3/" 
                    target="_blank" 
                    rel="noopener norefferrer"
                    aria-label="LinkedIn">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a class="linkedin" 
                    href="https://www.linkedin.com/in/ernestocosio/" 
                    target="_blank" 
                    rel="noopener norefferrer"
                    aria-label="LinkedIn">
                    <i class="fa-brands fa-linkedin-in"></i>
                </a>
            </div>
        </footer>
    </body>
